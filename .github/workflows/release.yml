# Release workflow — triggered by pushing a version tag (e.g. v1.0.1)
#
# Usage:
#   npm version patch|minor|major   # bumps package.json, commits, tags
#   git push && git push --tags     # triggers this workflow
#
# Rollback:
#   1. npm unpublish @kniferoll/kniferoll@<version>  (within 72h; version
#      number is burned for 24h — bump to next patch if re-releasing)
#   2. Roll kniferoll.dev back to the previous version:
#        gh workflow run update.yml -R kniferolldev/kniferoll.dev -f version=<previous>
#   3. Delete the git tag:
#        git tag -d v<version>
#        git push origin :refs/tags/v<version>

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Wait for npm propagation
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for @kniferoll/kniferoll@$VERSION on npm..."
          for i in $(seq 1 24); do
            if npm view "@kniferoll/kniferoll@$VERSION" version 2>/dev/null | grep -qxF "$VERSION"; then
              echo "Available."
              exit 0
            fi
            echo "  attempt $i/24, retrying in 10s..."
            sleep 10
          done
          echo "Timed out after ~4 minutes waiting for npm propagation"
          exit 1

      - name: Notify kniferoll.dev
        run: |
          gh api repos/kniferolldev/kniferoll.dev/dispatches \
            -f event_type=release \
            -f "client_payload[version]=${GITHUB_REF_NAME#v}"
        env:
          GH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}

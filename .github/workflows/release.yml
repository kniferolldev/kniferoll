# Release workflow — triggered by pushing a version tag (e.g. v1.0.1)
#
# Usage:
#   npm version patch|minor|major   # bumps package.json, commits, tags
#   git push && git push --tags     # triggers this workflow
#
# Rollback:
#   1. npm unpublish @kniferoll/kniferoll@<version>  (within 72h; version
#      number is burned for 24h — bump to next patch if re-releasing)
#   2. In kniferoll.dev, repoint the major symlink to the previous version:
#        cd static
#        ln -sf kr@<previous>.js kr@1.js
#        git add kr@1.js && git commit -m "Rollback to v<previous>" && git push
#   3. Delete the git tag:
#        git tag -d v<version>
#        git push origin :refs/tags/v<version>

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deploy bundle to kniferoll.dev
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY_DEV_SITE }}
        run: |
          # Extract version from tag (v1.0.1 -> 1.0.1)
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="${VERSION%%.*}"

          # Set up SSH for cross-repo push
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key"

          # Clone kniferoll.dev, copy bundle, update symlink
          git clone --depth 1 git@github.com:kniferolldev/kniferoll.dev.git /tmp/kniferoll.dev
          cp dist/kniferoll.min.js "/tmp/kniferoll.dev/static/kr@${VERSION}.js"
          cd /tmp/kniferoll.dev/static
          ln -sf "kr@${VERSION}.js" "kr@${MAJOR}.js"

          # Commit and push
          cd /tmp/kniferoll.dev
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "static/kr@${VERSION}.js" "static/kr@${MAJOR}.js"
          git commit -m "Update bundle to v${VERSION}"
          git push

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kniferoll Test Harness</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #fef3c7, #f3f4f6);
      }
      h1 {
        padding: 1.5rem 2rem;
        border-radius: 9999px;
        background-color: rgba(17, 24, 39, 0.9);
        color: white;
        box-shadow: 0 1.25rem 2.5rem -1.25rem rgba(15, 23, 42, 0.65);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <h1 data-testid="hero-title">Kniferoll</h1>
    <script type="module">
      document.body.dataset.bootstrap = "ready";
    </script>
  </body>
</html>
